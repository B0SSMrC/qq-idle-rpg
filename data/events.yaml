# flavor — 中式地牢叙事
- id: flavor
  type: flavor
  weight: 10
  texts:
    - "走廊空荡荡的，只有水滴回声。"
    - "墙上的火把忽明忽暗。"
    - "你听见远处有什么东西在爬动。"
    - "岩壁上刻着古篆符咒，微微发着幽光。"
    - "石棺中传来低沉的呓语，你侧身绕了过去。"
    - "磷火在廊道尽头飘荡，映出几道人影。"
    - "一阵阴风从深处涌来，脚下石板簌簌作响。"
    - "拐角处散落着前人的遗物，已腐朽得不成样子。"
    - "青铜门后的锁链轻轻晃动，像是刚有人经过。"
    - "地面积水映出你的影子，却比你慢了半拍。"
    - "壁龛里供着残破木牌，香灰还带着一点温热。"
    - "远处传来石磨转动的声音，沉闷得像雷。"
    - "你踩过一片碎瓦，瓦下露出半枚生锈铜钱。"
    - "空气里有淡淡药味，像是谁刚在此疗伤。"
    - "头顶落下一撮尘土，上方似乎有东西爬过。"
    - "墙缝里钻出冷雾，转眼又缩回黑暗深处。"
    - "一盏残灯无油自燃，照亮墙上一道旧刀痕。"
    - "石阶旁刻着几行小字，可惜大半已被苔痕吞没。"
    - "你听见有人在身后轻咳，回头却只有空荡长廊。"
    - "破旧幡布垂在门梁上，隐约写着镇邪二字。"
    - "一枚骨骰滚到脚边，点数停在了六。"
    - "井口深处传来水声，水面却没有半点波纹。"
    - "壁画上的武者缺了一只眼，另一只眼正对着你。"
    - "你闻到潮湿木头的气味，像是旧船沉在地下。"
    - "石柱后有一道浅浅脚印，很快被浮尘盖住。"
    - "几只空陶罐整齐摆着，罐口都朝向同一个方向。"
    - "一阵铃声从深处飘来，清脆得有些不合时宜。"
    - "你在墙角发现一截断香，断口新得不像古物。"
    - "一面铜镜倒扣在地上，镜背刻着细密的符线。"
    - "你经过一排空甲架，其中一副忽然轻轻晃了一下。"
    - "墙上的旧地图被潮气泡烂，只剩最深处还画着红点。"
    - "石阶边缘有新鲜划痕，像是什么重物刚被拖过去。"
    - "远处的黑暗里亮起一点火星，眨眼又灭了。"
    - "你在裂开的地砖下看见一枚失去光泽的徽章。"
    - "一阵热浪从门缝里涌出，随后又迅速冷却。"
    - "墙角的蜘蛛网被整齐切断，切口平滑得不自然。"
    - "你听见自己的脚步声晚了一拍才从前方传回来。"
    - "破旧祭台上摆着半杯浑浊的水，水面没有倒影。"
    - "一串细小铃铛挂在横梁上，却没有风能吹动它们。"
    - "地面有一行被擦去大半的字，只剩下“别回头”。"
    - "你从石缝里抽出一片残鳞，触手冰冷。"
    - "远处传来兵刃落地的声音，但走近后什么也没有。"
    - "墙壁深处像有心跳声，缓慢而沉重。"
    - "一扇小门开着缝，门后只有更深的黑暗。"
