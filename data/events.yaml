# flavor — 中式地牢叙事
- id: flavor
  type: flavor
  weight: 8
  texts:
    - "走廊空荡荡的，只有水滴回声。"
    - "墙上的火把忽明忽暗。"
    - "你听见远处有什么东西在爬动。"
    - "岩壁上刻着古篆符咒，微微发着幽光。"
    - "石棺中传来低沉的呓语，你侧身绕了过去。"
    - "磷火在廊道尽头飘荡，映出几道人影。"
    - "一阵阴风从深处涌来，脚下石板簌簌作响。"
    - "拐角处散落着前人的遗物，已腐朽得不成样子。"
